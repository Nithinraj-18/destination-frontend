<!-- ✅ FULL SCREEN LOADER -->
<div class="fullscreen-loader" *ngIf="isLoading">

  <div class="loader-box">
    <div class="spinner"></div>

    <h2>Destination Sugar Free</h2>

    <p>Please wait a moment... cart is loading 🛒</p>
  </div>

</div>

<div class="page-container" style="background: #5c3931;" *ngIf="!isLoading">

  <div class="cart-btn-wrapper">

    <button routerLink="/cart" class="btn cart-btn">
      🛒 Go to Cart
    </button>

  </div>

  <div class="grid" *ngIf="products.length > 0">

    <div class="card" *ngFor="let p of products">

      <img #productImg [src]="p.imageUrl" loading="lazy" alt="product image" />

      <h3>{{ p.name }}</h3>

      <p>₹ {{ p.price }}</p>

      <a class="details-link" (click)="openPopup(p)">
        Details
      </a>

      <p *ngIf="p.outOfStock" class="out-stock-msg">
        This product is currently out of stock.
      </p>

      <button
        class="btn add-btn"
        [disabled]="p.outOfStock"
        [class.disabled-btn]="p.outOfStock"
        (click)="addToCart(p, productImg)">

        {{ p.outOfStock ? 'Out of Stock' : 'Add to Cart' }}

      </button>

    </div>

  </div>

  <!-- PRODUCT DETAILS POPUP -->
  <div class="popup-overlay" *ngIf="showPopup">

    <div class="popup-box">

      <h2>{{ selectedProduct?.name }}</h2>

      <img
        [src]="selectedProduct?.imageUrl"
        alt="product"
        class="popup-img" />

      <p>
        <strong style="color:black;">Category:</strong>
        {{ selectedProduct?.category }}
      </p>

      <p>
        <strong style="color:black;">Description:</strong>
        {{ selectedProduct?.description }}
      </p>

      <button class="close-btn" (click)="closePopup()">
        Close
      </button>

    </div>

  </div>

</div>
